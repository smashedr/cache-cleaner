# Options

option:
  toggle:
    autoReload:
      label: 사이트 자동 새로고침
      tip: 캐시를 비운 후 사이트를 새로고침합니다.
    showAllButtons:
      label: 모든 버튼 표시
      tip: 팝업에 사이트 및 브라우저 버튼을 모두 표시합니다.
    popupBrowser:
      label: 브라우저 탭을 기본으로 설정
      tip: 팝업을 열 때 브라우저 탭을 먼저 보여줍니다.
    showConfirmation:
      label: 확인창 표시
      tip: 캐시를 비우기 전에 확인 과정을 거칩니다.
    showDeprecated:
      label: 지원 중단된 옵션 표시
      tip: 지원이 중단된(Deprecated) 옵션들을 표시합니다.
    contextMenu:
      label: 컨텍스트 메뉴 표시
      tip: 우클릭 컨텍스트 메뉴를 사용합니다.
    contextAction:
      label: 툴바 아이콘에 모든 항목 표시
      tip: 도구 모음 아이콘 우클릭 시 모든 컨텍스트 항목을 표시합니다.
    showErrorNotifications:
      label: 오류 알림 표시
      tip: 우클릭 메뉴 및 키보드 단축키 사용 시 오류를 알립니다.
    showUpdate:
      label: 업데이트 시 릴리스 노트 표시
      tip: 업데이트 후 알림을 표시합니다.

  confirm:
    site:
      label: 사이트 캐시
      tip: 사이트 캐시
    siteAll:
      label: 모든 사이트 캐시
      tip: 모든 사이트 캐시
    browser:
      label: 브라우저 캐시
      tip: 브라우저 캐시
    browserAll:
      label: 전체 브라우저 캐시
      tip: 전체 브라우저 캐시

  site:

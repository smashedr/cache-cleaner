# Options

option:
  toggle:
    autoReload:
      label: サイトを自動更新
      tip: キャッシュ削除後にサイトをリロードします。
    showAllButtons:
      label: すべてのボタンを表示
      tip: ポップアップに「サイト」と「ブラウザ」両方のボタンを表示します。
    popupBrowser:
      label: デフォルトでブラウザを表示
      tip: ポップアップを開いたときに「ブラウザ」タブを最初に表示します。
    showConfirmation:
      label: 確認画面を表示
      tip: キャッシュをクリアする前に確認メッセージを表示します。
    showDeprecated:
      label: 非推奨のオプションを表示
      tip: 非推奨となったオプション項目を表示します。
    contextMenu:
      label: コンテキストメニューを表示
      tip: 右クリックメニューを表示します。
    contextAction:
      label: ツールバーアイコンに全項目を表示
      tip: ツールバーアイコンを右クリックした際に、すべてのメニュー項目を表示します。
    showErrorNotifications:
      label: エラー通知を表示
      tip: 右クリックメニューやショートカットキーでの操作エラーを通知します。
    showUpdate:
      label: アップデート時にリリースノートを表示
      tip: 更新通知を表示します。


# Options

option:
  toggle:
    autoReload:
      label: Recarregar Site Automaticamente
      tip: Atualiza o site após limpar o cache.
    showAllButtons:
      label: Mostrar Todos os Botões
      tip: Mostra os botões de site e de navegador no pop-up.
    popupBrowser:
      label: Padrão para Navegador
      tip: Mostrar a guia Navegador ao abrir o pop-up.
    showConfirmation:
      label: Mostrar Confirmação
      tip: Mostrar confirmação antes de limpar o cache.
    showDeprecated:
      label: Mostrar Opções Obsoletas
      tip: Exibe opções que foram descontinuadas.
    contextMenu:
      label: Mostrar Menu de Contexto
      tip: Mostrar menu de contexto no clique direito.
    contextAction:
      label: Mostrar Todos os Itens no Ícone da Barra de Ferramentas
      tip: Mostra todos os itens de contexto ao clicar com o botão direito no ícone da barra de ferramentas.
    showErrorNotifications:
      label: Mostrar Notificações de Erro
      tip: Para menu de contexto e atalhos de teclado.
    showUpdate:
      label: Mostrar Notas de Lançamento ao Atualizar
      tip: Mostrar notificações de atualização.


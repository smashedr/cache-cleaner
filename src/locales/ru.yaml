      label: Контекстное меню
      tip: Показывать пункты в меню правой кнопки мыши.
    contextAction:
      label: Все элементы на иконке
      tip: Показывать все элементы контекстного меню при клике правой кнопкой на иконку панели инструментов.
    showErrorNotifications:
      label: Уведомления об ошибках
      tip: Для контекстного меню и горячих клавиш.
    showUpdate:
      label: Заметки об обновлении
      tip: Показывать уведомления о новых версиях.


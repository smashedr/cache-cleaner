# Options

option:
  toggle:
    autoReload:
      label: Автообновление сайта
      tip: Обновить страницу после очистки кеша.
    showAllButtons:
      label: Показывать все кнопки
      tip: Показывать кнопки и сайта, и браузера во всплывающем окне.

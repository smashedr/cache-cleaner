# Options

option:
  toggle:
    autoReload:
      label: Recargar sitio automáticamente
      tip: Actualiza el sitio después de limpiar la caché.
    showAllButtons:
      label: Mostrar todos los botones
      tip: Muestra los botones de sitio y navegador en la ventana emergente.
    popupBrowser:
      label: Navegador por defecto
      tip: Muestra la pestaña del Navegador al abrir la ventana emergente.
    showConfirmation:
      label: Mostrar confirmación
      tip: Muestra una confirmación antes de limpiar la caché.
    showDeprecated:
      label: Mostrar opciones obsoletas
      tip: Muestra las opciones que han quedado obsoletas.
    contextMenu:
      label: Mostrar menú contextual
      tip: Muestra el menú al hacer clic derecho.
    showUpdate:
      label: Mostrar notas al actualizar
      tip: Muestra notificaciones de actualización.

  confirm:
    site:
      label: Caché del sitio
      tip: Caché del sitio
    siteAll:

# Options

option:
  toggle:
    autoReload:
      label: 自动刷新页面
      tip: 清除缓存后自动刷新当前页面。
    showAllButtons:
      label: 显示所有按钮
      tip: 在弹出窗口中同时显示站点和浏览器按钮。
    popupBrowser:
      label: 默认为浏览器
      tip: 打开弹出窗口时默认显示浏览器选项卡。
    showConfirmation:
      label: 显示确认对话框
      tip: 清除缓存前弹出确认。
    showDeprecated:
      label: 显示已弃用选项
      tip: 显示已不再推荐使用的选项。
    contextMenu:
      label: 显示右键菜单
      tip: 在浏览器中显示右键上下文菜单。
    contextAction:
      label: 在工具栏图标显示所有项
      tip: 右键点击工具栏图标时显示所有上下文菜单项。
    showErrorNotifications:
      label: 显示错误通知
      tip: 针对右键菜单和键盘快捷键的错误提醒。
    showUpdate:
      label: 更新后显示日志
      tip: 插件更新后显示更新日志通知。

  confirm:
    site:
      label: 站点缓存
      tip: 站点缓存
    siteAll:
      label: 所有站点缓存
      tip: 所有站点缓存
    browser:
      label: 浏览器缓存
      tip: 浏览器缓存
    browserAll:
      label: 所有浏览器缓存
      tip: 所有浏览器缓存

  site:
    appcache:
      label: 应用缓存 (App Cache)
      tip: 浏览器应用缓存 (已弃用)
    cacheStorage:
      label: 缓存存储 (Cache Storage)
      tip: 站点缓存存储
    cookies:
      label: Cookie
      tip: 站点 Cookie
    fileSystems:
      label: 文件系统
      tip: 站点文件系统 (已弃用)
    indexedDB:

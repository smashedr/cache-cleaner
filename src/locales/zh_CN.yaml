# Options

option:
  toggle:
    autoReload:
      label: 自动刷新网站
      tip: 清除缓存后刷新页面。
    showAllButtons:
      label: 显示所有按钮
      tip: 在弹出窗口中同时显示网站和浏览器按钮。
    popupBrowser:
      label: 默认显示浏览器
      tip: 打开弹出窗口时默认显示浏览器选项卡。
    showConfirmation:
      label: 显示确认提示
      tip: 清除缓存前显示确认框。
    showDeprecated:
      label: 显示已弃用的选项
      tip: 显示已标记为弃用的设置项。
    contextMenu:
      label: 显示右键菜单
      tip: 在右键菜单中显示相关功能。
    contextAction:
      label: 在工具栏图标上显示所有项目
      tip: 右键点击工具栏图标时显示所有上下文项目。
    showErrorNotifications:
      label: 显示错误通知
      tip: 用于右键上下文菜单和键盘快捷键。
    showUpdate:
      label: 更新后显示日志
      tip: 显示版本更新通知。

  confirm:
    site:
      label: 网站缓存
      tip: 网站缓存
    siteAll:
      label: 所有网站缓存
      tip: 所有网站缓存
    browser:
      label: 浏览器缓存
      tip: 浏览器缓存
    browserAll:
      label: 所有浏览器缓存
      tip: 所有浏览器缓存

  site:
    appcache:
      label: 应用缓存 (App Cache)
      tip: 浏览器应用缓存（已弃用）
